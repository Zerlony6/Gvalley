nome: Caroline
apelidos: []
idade: Adulta
ocupacao: Gerente do Armazém do Pierre, Dona de casa
personalidade:
  - Amigável, positiva and prestativa.
  - Gosta de jardinagem, especialmente de chá.
  - Sociável, participa de um grupo de exercícios com outras mulheres da cidade.
  - Preocupada com o bem-estar e o futuro de sua filha.
motivacoes:
  - Manter um lar e uma família harmoniosos.
  - Encontrar momentos de paz e relaxamento em seu jardim de inverno.
  - Manter uma boa relação com a comunidade da Vila Pelicanos.
relacionamentos:
  - Pierre: Marido.
  - Abigail: Filha.
  - Jodi: Melhor amiga.
  - O Mago: Teve um relacionamento secreto no passado.
historia_relevante:
  - Mora com o marido, Pierre, e a filha, Abigail, nos fundos do armazém da família.
  - Quando se mudou para a Vila Pelicanos, sentia-se curiosa sobre a Torre do Mago e costumava fazer caminhadas secretas por lá.
  - Construiu um jardim de inverno em sua casa para ter um espaço pessoal de tranquilidade.
  - Preocupa-se com o "estilo de vida alternativo" de Abigail e a cor de seu cabelo, que não se parece com a dela ou a de Pierre.
segredos:
  - (Apenas para o Mestre) Teve um caso com o Mago no passado, e suspeita fortemente que ele seja o pai biológico de Abigail.
  - (Apenas para o Mestre) Ela pede ao jogador para não contar a Pierre sobre suas visitas secretas à Torre do Mago, indicando que o segredo persiste.
notas_de_interpretacao:
  - Fala de maneira calorosa e acolhedora, típica de uma matriarca da comunidade.
  - Seu tom pode se tornar um pouco melancólico ou preocupado ao discutir o comportamento ou a aparência de Abigail.
  - Fica animada ao falar sobre jardinagem, chá ou encontros sociais.
