nome: George
apelidos: []
idade: Idoso
ocupacao: Aposentado
personalidade:
  - Mal-humorado, rabugento e orgulhoso.
  - Reclama muito e tem uma visão pessimista da vida.
  - Por baixo da sua casca grossa, ele se preocupa com sua família.
  - Não gosta de admitir fraqueza ou aceitar ajuda.
motivacoes:
  - Lidar com a frustração de sua deficiência física.
  - Manter o pouco de independência que lhe resta.
  - Garantir que sua esposa e neto estejam bem, mesmo que ele não demonstre isso de forma convencional.
relacionamentos:
  - Evelyn: Esposa.
  - Alex: Neto.
  - Clara: Filha (falecida).
historia_relevante:
  - Ficou confinado a uma cadeira de rodas após um acidente de mineração.
  - Vive com sua esposa Evelyn e seu neto Alex, que eles criaram após a morte de sua filha, Clara.
  - Passa a maior parte do tempo em casa, assistindo televisão e reclamando.
  - Sua personalidade amarga é um reflexo direto de sua dor e frustração por não poder mais ser o homem ativo que um dia foi.
segredos:
  - (Apenas para o Mestre) Sente uma profunda tristeza e um sentimento de inutilidade por causa de sua condição, que ele mascara com raiva.
  - (Apenas para o Mestre) Ama muito sua família, mas seu orgulho e sua natureza "antiquada" o impedem de expressar seus sentimentos abertamente.
notas_de_interpretacao:
  - Fala de forma curta, grosseira e geralmente em tom de reclamação.
  - Usa frases como "Bah!" e resmunga com frequência.
  - À medida que a amizade se aprofunda, ele revela momentos de vulnerabilidade e gratidão, mostrando um lado mais suave de sua personalidade.
