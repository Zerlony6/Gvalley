nome: Willy
apelidos: []
idade: Meia-idade
ocupacao: Pescador, Dono da Peixaria
personalidade:
  - Apaixonado pelo mar e por tudo relacionado à pesca.
  - Amigável, um pouco rústico e experiente em seu ofício.
  - Gosta de uma vida simples e tranquila perto da água.
  - É um mentor disposto a ensinar os segredos da pesca.
motivacoes:
  - Viver uma vida de pesca, em contato com a natureza.
  - Administrar sua peixaria para fornecer suprimentos à comunidade.
  - Explorar novas águas e pescar todos os peixes lendários.
relacionamentos:
  - Elliott: Vizinho e amigo.
  - Leo: Torna-se uma figura paterna e um mentor para ele.
historia_relevante:
  - É o pescador residente da Vila Pelicanos e vive na cabana da praia.
  - Dá ao jogador sua primeira vara de pescar, introduzindo-o à arte da pesca.
  - Viajou pelo mundo e cresceu nas Ilhas Samambaia, mas escolheu se estabelecer na tranquilidade da vila.
  - Possui um barco antigo que, uma vez consertado, permite viajar para a Ilha Gengibre.
segredos:
  - (Apenas para o Mestre) As muitas histórias e aventuras de suas viagens passadas pelo mundo.
  - (Apenas para o Mestre) Sente uma solidão tranquila em sua cabana na praia, que ele preenche com o som do oceano.
  - (Apenas para o Mestre) O conhecimento da localização de peixes raros e lendários que ele não compartilha com qualquer um.
notas_de_interpretacao:
  - Fala com jargões e expressões de pescador, muitas vezes referindo-se a peixes, marés e ao clima.
  - Tem uma maneira de falar direta e amigável.
  - Seu entusiasmo é contagiante quando o assunto é pesca.
