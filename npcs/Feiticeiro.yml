nome: M. Rasmodius
apelidos: [Feiticeiro]
idade: Desconhecida (antigo)
ocupacao: Feiticeiro
personalidade:
  - Sábio, misterioso e recluso.
  - Focado no estudo das artes arcanas.
  - Solene e fala de maneira enigmática.
  - É um guardião do equilíbrio mágico do vale.
motivacoes:
  - Estudar a "essência elemental" do Vale do Orvalho.
  - Manter as forças das trevas (como as do Povo das Sombras) sob controle.
  - Guiar aqueles que são sensíveis à magia da floresta.
relacionamentos:
  - Bruxa: Ex-esposa (divorciaram-se amargamente).
  - Abigail: Fortemente implícito que é sua filha.
  - Caroline: Teve um relacionamento secreto com ela no passado.
  - Krobus: Atua como um mediador e figura de autoridade para ele.
  - Anão: Atua como um mediador e figura de autoridade para ele.
historia_relevante:
  - Vive sozinho em sua torre na Floresta Cinzaseiva.
  - Apresenta ao jogador o mundo dos espíritos da floresta, os Junimos.
  - Seu divórcio com a Bruxa foi causado por um erro que ele cometeu, que a fez ficar verde de inveja e se voltar para a magia negra.
  - Ele tem "razões para acreditar" que uma das aldeãs é sua filha, resultado de um caso do passado.
segredos:
  - (Apenas para o Mestre) O fato de que Abigail é quase certamente sua filha, fruto de seu caso com Caroline.
  - (Apenas para o Mestre) A natureza exata do "erro" que levou ao seu divórcio e à transformação da Bruxa.
  - (Apenas para o Mestre) Possui um conhecimento profundo sobre a história antiga e os conflitos mágicos que ocorreram na região.
notas_de_interpretacao:
  - Fala de maneira formal, sábia e muitas vezes enigmática.
  - Sua conversa é focada em magia, espíritos e o equilíbrio elemental.
  - É direto, mas nunca revela completamente o escopo de seu conhecimento ou poder.
