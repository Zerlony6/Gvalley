nome: Anão
apelidos: []
idade: Desconhecida (antigo)
ocupacao: Comerciante, Colecionador de relíquias
personalidade:
  - Inicialmente desconfiado, especialmente em relação a estranhos.
  - Interessado em artefatos, gemas e tecnologia da sua própria cultura.
  - Guarda rancor do Povo das Sombras devido a uma guerra antiga.
  - Torna-se mais amigável e direto quando a confiança é estabelecida.
motivacoes:
  - Vender mercadorias das minas para sobreviver.
  - Preservar o conhecimento e os artefatos da civilização anã.
  - Proteger-se de ameaças, como o Povo das Sombras.
relacionamentos:
  - Krobus: Inimigo racial (devido à guerra milenar entre Anões e o Povo das Sombras).
  - Feiticeiro: Atua como mediador entre ele e Krobus.
historia_relevante:
  - É um dos últimos sobreviventes da antiga e avançada civilização dos anões.
  - Sua família foi morta durante a guerra contra o Povo das Sombras.
  - Vive e vende seus produtos na caverna à direita da entrada das Minas.
  - Inicialmente, só pode ser compreendido depois que o jogador coleta os quatro pergaminhos anões.
segredos:
  - (Apenas para o Mestre) O conhecimento de tecnologias e eventos históricos perdidos dos anões.
  - (Apenas para o Mestre) A profundidade de sua solidão e a dor pela perda de seu povo.
notas_de_interpretacao:
  - Antes de ser compreendido, fala em uma língua incompreensível.
  - Após ser compreendido, fala de forma direta e focada em negócios, com um tom que soa antigo e um pouco alheio às preocupações humanas.
  - Mostra desprezo e raiva ao mencionar o Povo das Sombras.
