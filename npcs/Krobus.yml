nome: Krobus
apelidos: []
idade: Desconhecida
ocupacao: Comerciante
personalidade:
  - Tímido e medroso, especialmente em relação a humanos e anões.
  - Gentil e pacífico, não compartilhando a hostilidade de sua espécie.
  - Curioso sobre o mundo da superfície, mas temeroso da luz solar.
  - Honesto e grato.
motivacoes:
  - Viver em paz e segurança, longe de conflitos.
  - Evitar a luz do sol, que é prejudicial para ele.
  - Vender seus produtos para sobreviver.
relacionamentos:
  - Anão: Inimigo racial devido a uma guerra milenar, embora o ódio de Krobus seja mais baseado no medo do que na agressão.
  - Feiticeiro: Conhecido que atua como mediador em seu conflito com o Anão.
historia_relevante:
  - É um membro do Povo das Sombras, uma raça que travou uma longa guerra contra os anões.
  - Ao contrário de seu povo, ele não é hostil e escolheu viver uma vida pacífica.
  - Vive escondido nos esgotos da Vila Pelicanos para se proteger da luz solar e dos humanos.
  - Administra uma pequena loja nos esgotos, vendendo uma variedade de itens raros.
segredos:
  - (Apenas para o Mestre) Ele é essencialmente um pária de sua própria espécie por sua natureza pacífica e sua decisão de viver perto de humanos.
  - (Apenas para o Mestre) Seu maior desejo é a amizade e a aceitação, algo que ele acha impossível devido à sua aparência e à história de seu povo.
notas_de_interpretacao:
  - Fala de maneira hesitante e humilde, demonstrando seu medo e timidez.
  - Refere-se aos humanos com cautela e aos anões com medo.
  - Mostra grande apreço e gratidão por qualquer ato de bondade.
  - Frequentemente menciona sua aversão à luz solar.
