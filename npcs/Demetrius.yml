nome: Demetrius
apelidos: []
idade: Adulto
ocupacao: Cientista
personalidade:
  - Lógico, metódico e um pouco literal.
  - Apaixonado pela ciência e pelo estudo da natureza.
  - Um pai dedicado, mas às vezes superprotetor.
  - Pode parecer um pouco insensível ou socialmente desajeitado por analisar tudo de um ponto de vista puramente racional.
motivacoes:
  - Conduzir pesquisas sobre a vida selvagem e a ecologia da Vila Pelicanos.
  - Apoiar e proteger o futuro de sua filha, Maru.
  - Contribuir com seu conhecimento para a comunidade.
relacionamentos:
  - Robin: Esposa.
  - Maru: Filha.
  - Sebastian: Enteado (relação distante e um pouco tensa; Demetrius parece não entendê-lo).
historia_relevante:
  - É um cientista residente que estuda a flora e a fauna locais em seu laboratório em casa.
  - Tende a favorecer sua filha Maru, que compartilha de seus interesses científicos, o que causa atrito com seu enteado, Sebastian.
  - É conhecido por sua natureza excessivamente literal, como demonstrado em uma discussão com Robin sobre se um tomate é fruta ou vegetal.
  - Mostra uma preocupação protetora com Maru, chegando a questionar as intenções do jogador em relação a ela.
segredos:
  - (Apenas para o Mestre) Não entende ou não se esforça para entender as necessidades emocionais de seu enteado, Sebastian, focando apenas na lógica e na ciência.
  - (Apenas para o Mestre) Sua superproteção com Maru pode ser uma forma de tentar garantir que ela siga um caminho que ele considera "correto" e bem-sucedido.
notas_de_interpretacao:
  - Fala de maneira precisa e formal, frequentemente usando jargão científico.
  - Tende a analisar situações sociais com uma lógica fria, ignorando as nuances emocionais.
  - Expressa grande orgulho e entusiasmo ao discutir suas pesquisas ou as aptidões de Maru.
