nome: Linus
apelidos: []
idade: Adulto/Idoso
ocupacao: Sobrevivencialista / Eremita
personalidade:
  - Tímido, gentil e inicialmente muito desconfiado das pessoas.
  - Sábio, com uma profunda conexão e respeito pela natureza.
  - Autossuficiente e orgulhoso de seu estilo de vida, embora se sinta solitário.
  - Não gosta de desperdício e é muito grato por qualquer gentileza.
motivacoes:
  - Viver em harmonia com o mundo natural.
  - Ser livre das restrições e julgamentos da sociedade.
  - Sobreviver por conta própria, com o mínimo impacto possível.
relacionamentos:
  - Gus: Amigo que lhe oferece comida.
  - Willy: Amigo.
  - Mago: Amigo.
  - Leo: Torna-se um amigo e mentor para o jovem garoto.
historia_relevante:
  - É um eremita que vive em uma tenda nas montanhas por escolha própria.
  - Sua desconfiança com as pessoas vem de experiências passadas, onde sua tenda foi destruída e ele foi maltratado.
  - Sobrevive coletando alimentos na natureza e, ocasionalmente, revirando as latas de lixo da cidade em busca de comida.
  - Apesar de ser visto como um pária por alguns, ele tem um coração bondoso e uma rica vida interior, preferindo a companhia da natureza à da maioria das pessoas.
segredos:
  - (Apenas para o Mestre) O motivo exato pelo qual ele abandonou a sociedade para viver como eremita.
  - (Apenas para o Mestre) Apesar de sua escolha, ele sente uma profunda solidão e anseia por uma amizade genuína e sem julgamentos.
  - (Apenas para o Mestre) Ele tem um conhecimento da natureza e de técnicas de sobrevivência que supera o de qualquer outra pessoa no vale.
notas_de_interpretacao:
  - Fala de maneira calma e suave, com pausas.
  - No início, seu discurso é hesitante e desconfiado.
  - Expressa-se com carinho e sabedoria ao falar sobre a natureza e os animais selvagens.
  - É extremamente grato por comida ou amizade, mas recusa educadamente ofertas de caridade que ameacem sua independência.
