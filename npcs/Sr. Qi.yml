nome: Sr. Qi
apelidos: []
idade: Desconhecida
ocupacao: Guardião de desafios, Proprietário do Cassino
personalidade:
  - Misterioso, enigmático e um pouco travesso.
  - Gosta de testar a determinação e a habilidade das pessoas através de desafios.
  - Parece ser onisciente, sabendo muito sobre os segredos do vale e do jogador.
  - É amigável, mas de uma maneira distante e observadora, tratando tudo como um jogo.
motivacoes:
  - Aliviar seu tédio observando e testando "indivíduos interessantes" como o jogador.
  - Recompensar aqueles que se provam dignos ao superar seus desafios.
  - Manter um ar de mistério e intriga.
relacionamentos:
  - Ajudante: Empregado/Guarda-costas.
  - Segurança: Empregado/Guarda-costas.
  - Sandy: Parceira de negócios/Inquilina (ele opera o cassino nos fundos da loja dela).
historia_relevante:
  - É uma figura sombria e misteriosa que inicialmente contata o jogador através de uma série de missões secretas.
  - Ele é o dono do Cassino no Deserto de Calico.
  - Mais tarde, ele estabelece a Sala de Nozes do Sr. Qi na Ilha Gengibre, oferecendo desafios de final de jogo em troca de uma moeda especial, as Gemas Qi.
  - Sua origem, a fonte de sua riqueza e a extensão de sua influência são completamente desconhecidas.
segredos:
  - (Apenas para o Mestre) Praticamente tudo sobre ele é um segredo: sua verdadeira identidade, sua espécie (ele tem a pele azul), sua idade e de onde ele veio.
  - (Apenas para o Mestre) O propósito final de seus "testes" e por que ele escolheu o jogador especificamente.
  - (Apenas para o Mestre) Como ele obteve sua vasta riqueza e conhecimento arcano.
notas_de_interpretacao:
  - Fala de maneira enigmática e desafiadora, muitas vezes em enigmas ou de forma a testar o jogador.
  - Mantém um tom calmo e divertido, como se estivesse sempre no controle e se divertindo com a situação.
  - Nunca dá uma resposta direta sobre si mesmo, preferindo aprofundar o mistério.
