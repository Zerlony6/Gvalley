nome: Leo
apelidos: []
idade: Criança
ocupacao: Nenhuma (sobrevivente)
personalidade:
  - Inicialmente selvagem, tímido e desconfiado de humanos.
  - Doce, curioso e um pouco ingênuo sobre o mundo civilizado.
  - Sente-se mais confortável com pássaros do que com pessoas.
  - Solitário, mas anseia por amizade.
motivacoes:
  - Superar seu medo de pessoas.
  - Fazer amigos e encontrar um lugar na comunidade.
  - Aprender sobre o mundo fora de sua ilha.
relacionamentos:
  - Papagaios: Sua família adotiva.
  - Linus: Amigo e mentor que entende seu estilo de vida.
  - Willy: Amigo que o ajuda a se conectar com a Vila Pelicanos.
  - Jas: Amiga.
  - Vincent: Amigo.
historia_relevante:
  - Único sobrevivente de um naufrágio, perdeu seus pais no mar.
  - Cresceu sozinho na Ilha Gengibre, sendo criado por papagaios.
  - Não teve contato humano por anos, tornando-o extremamente tímido e incapaz de falar com estranhos no início.
  - Depois de fazer amizade com o jogador, ele ganha coragem para se mudar para a Vila Pelicanos e tentar se integrar à sociedade.
segredos:
  - (Apenas para o Mestre) A profunda solidão e o trauma de perder seus pais e crescer isolado.
  - (Apenas para o Mestre) Sente-se como um estranho, dividido entre o mundo da natureza que conhece e o mundo humano que está tentando entender.
notas_de_interpretacao:
  - No início, não fala, apenas observa de longe.
  - Depois que começa a falar, sua linguagem é simples e hesitante.
  - Frequentemente imita sons de pássaros ou refere-se à sua "família de pássaros".
  - Demonstra uma curiosidade infantil sobre objetos e costumes comuns da cidade.
