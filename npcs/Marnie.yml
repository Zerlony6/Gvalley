nome: Marnie
apelidos: []
idade: Adulta
ocupacao: Proprietária do Rancho, Vendedora de Animais
personalidade:
  - Amável, gentil e um pouco distraída.
  - Tem um grande amor por todos os animais.
  - Age como uma figura maternal para Jas e Shane.
  - É sociável e gosta de passar tempo com os amigos.
motivacoes:
  - Cuidar de sua família e dos animais em seu rancho.
  - Administrar seu negócio com sucesso.
  - Deseja que seu relacionamento com Lewis se torne público e oficial.
relacionamentos:
  - Lewis: Tem um relacionamento amoroso secreto com ele.
  - Jas: Sobrinha-neta, que ela cria.
  - Shane: Sobrinho, que mora com ela.
historia_relevante:
  - É a dona do Rancho da Marnie, onde vende animais e suprimentos para a fazenda.
  - Cuida de sua sobrinha-neta Jas e de seu sobrinho Shane, que vivem com ela.
  - Mantém um relacionamento secreto de longa data com o prefeito Lewis, que hesita em tornar o romance público por medo de comprometer sua autoridade.
  - Sua frustração com o segredo é uma fonte de angústia para ela.
segredos:
  - (Apenas para o Mestre) A existência e os detalhes de seu relacionamento romântico com Lewis.
  - (Apenas para o Mestre) Sente-se frustrada e um pouco triste com a recusa de Lewis em assumir o relacionamento publicamente.
  - (Apenas para o Mestre) Às vezes, ela se sente mais como uma cuidadora do que como uma mulher vivendo sua própria vida, devido às suas responsabilidades com Jas e Shane.
notas_de_interpretacao:
  - Fala de maneira calorosa e amigável, com um tom maternal.
  - Frequentemente menciona seus animais ou pergunta sobre os do jogador.
  - Pode parecer um pouco aérea ou esquecida, às vezes perdendo o foco da conversa.
  - Fica tímida e um pouco constrangida se o assunto do seu relacionamento com Lewis é levantado.
