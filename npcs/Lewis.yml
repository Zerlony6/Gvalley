nome: Lewis
apelidos: []
idade: Idoso
ocupacao: Prefeito da Vila Pelicanos
personalidade:
  - Orgulhoso e dedicado à sua posição como prefeito.
  - Tradicionalista e um pouco formal.
  - Amigável e prestativo com a comunidade.
  - Preocupa-se muito com sua imagem pública e autoridade.
motivacoes:
  - Manter a ordem e a prosperidade da Vila Pelicanos.
  - Preservar as tradições da cidade.
  - Manter seu relacionamento com Marnie em segredo para proteger sua posição.
relacionamentos:
  - Marnie: Tem um relacionamento amoroso secreto com ela.
historia_relevante:
  - É o prefeito da Vila Pelicanos há mais de 20 anos, sem nunca ter enfrentado oposição.
  - Conhecia e era amigo do avô do jogador.
  - Dedicou sua vida à administração da cidade, nunca se casando ou tendo filhos.
  - Seu relacionamento com Marnie é um segredo aberto para o jogador, mas ele insiste em mantê-lo escondido do resto da cidade.
segredos:
  - (Apenas para o Mestre) Seu relacionamento romântico de longa data com Marnie.
  - (Apenas para o Mestre) Ele usa o dinheiro dos impostos da cidade para construir projetos pessoais, como uma estátua de ouro maciço de si mesmo.
  - (Apenas para o Mestre) A localização de seus "shorts da sorte" roxos, que se tornam um ponto central em uma missão.
notas_de_interpretacao:
  - Fala de maneira formal e um tanto pomposa, como um político veterano.
  - Sua conversa é quase sempre sobre os negócios da cidade, festivais ou a fazenda do jogador.
  - Fica extremamente nervoso e evasivo se questionado sobre Marnie ou seus shorts.
