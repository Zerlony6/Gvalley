nome: Kent
apelidos: []
idade: Adulto
ocupacao: Soldado (retornado)
personalidade:
  - Sofre de estresse pós-traumático (TEPT).
  - Pode parecer severo e distante, mas ama profundamente sua família.
  - Luta para se readaptar à vida civil pacífica.
  - É sensível a ruídos altos e repentinos, que o lembram da guerra.
motivacoes:
  - Reconectar-se com sua esposa e filhos após um longo período de ausência.
  - Encontrar paz e um novo propósito fora do exército.
  - Lidar com seus traumas de guerra.
relacionamentos:
  - Jodi: Esposa.
  - Sam: Filho.
  - Vincent: Filho.
historia_relevante:
  - Chega à Vila Pelicanos na Primavera do Ano 2, após servir no exército por um longo tempo.
  - Ele perdeu anos do crescimento de seus filhos e luta para se encaixar novamente na dinâmica familiar.
  - Mostra claros sinais de TEPT, como em um evento em que o som de pipoca o perturba por lembrá-lo de combate.
  - Apesar de suas lutas internas, ele se esforça para ser um bom marido e pai.
segredos:
  - (Apenas para o Mestre) A extensão total dos horrores que ele testemunhou na guerra, que ele mantém para si mesmo.
  - (Apenas para o Mestre) Um profundo medo de que seu trauma o impeça de ser o marido e pai que sua família merece.
  - (Apenas para o Mestre) Sente uma culpa imensa por ter estado ausente por tanto tempo.
notas_de_interpretacao:
  - Fala de maneira educada, mas um pouco rígida e formal.
  - Seu tom é geralmente sério e contido.
  - Reage com nervosismo ou irritação a barulhos altos e inesperados.
  - Demonstra seu amor pela família através de ações e preocupações, mais do que por palavras afetuosas.
