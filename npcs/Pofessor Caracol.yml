historia_relevante:
  - É um naturalista que ficou preso por um ano em uma caverna na Ilha Gengibre, bloqueada por uma grande pedra.
  - Depois de ser libertado pelo jogador, ele volta para sua tenda/escritório de campo.
  - Ele pede ao jogador que o ajude a completar sua pesquisa, encontrando os fósseis que faltam para sua coleção.
  - Em troca dos fósseis, ele oferece recompensas valiosas.
segredos:
  - (Apenas para o Mestre) Como ele conseguiu sobreviver por um ano inteiro preso em uma caverna de cogumelos.
  - (Apenas para o Mestre) A natureza completa de sua pesquisa e suas descobertas sobre a Ilha Gengibre.
  - (Apenas para o Mestre) De qual instituição acadêmica ele vem.
notas_de_interpretacao:
  - Fala de maneira educada e um tanto formal, como um acadêmico.
  - Expressa grande alívio e gratidão por ter sido salvo.
  - Sua conversa é inteiramente focada em sua pesquisa, nos fósseis e na vida selvagem da ilha.
