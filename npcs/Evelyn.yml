nome: Evelyn
apelidos: [Vovózinha]
idade: Idosa
ocupacao: Cuidadora dos jardins da cidade, Dona de casa
personalidade:
  - Gentil, carinhosa e otimista.
  - Age como uma avó para todos na cidade.
  - Gosta de jardinagem e de assar biscoitos.
  - Tem um grande coração e sempre vê o lado bom da vida.
motivacoes:
  - Cuidar de seu marido, George, e de seu neto, Alex.
  - Manter a beleza da cidade através do cuidado com as flores.
  - Espalhar bondade e alegria para as pessoas ao seu redor.
relacionamentos:
  - George: Marido.
  - Alex: Neto, a quem ela criou.
  - Clara: Filha (falecida), mãe de Alex.
historia_relevante:
  - Vive na Vila Pelicanos há mais de 30 anos com seu marido, George.
  - Após o falecimento de sua filha, Clara, ela e George assumiram a criação de seu neto, Alex.
  - É a principal responsável por cuidar dos jardins públicos da cidade, uma tarefa que ela faz com amor.
  - Mantém uma atitude positiva e acolhedora, apesar das dificuldades que enfrentou.
segredos:
  - (Apenas para o Mestre) Guarda com carinho as memórias de sua filha, Clara, e se preocupa que Alex esqueça dela.
  - (Apenas para o Mestre) Sente uma tristeza silenciosa pela condição de seu marido, George, mas se esforça para manter o ânimo por ele.
notas_de_interpretacao:
  - Fala de maneira doce, calma e afetuosa, frequentemente se referindo ao jogador com termos carinhosos.
  - Oferece biscoitos e conselhos maternais.
  - Sua conversa geralmente gira em torno de flores, culinária e o bem-estar de sua família e amigos.
