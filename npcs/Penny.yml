nome: Penny
apelidos: []
idade: Jovem Adulta
ocupacao: Tutora (de Jas e Vincent)
personalidade:
  - Tímida, modesta e gentil.
  - Otimista e paciente, apesar de suas circunstâncias difíceis.
  - Uma leitora ávida que encontra refúgio nos livros.
  - Quieta e atenciosa.
motivacoes:
  - Ter um lar estável e uma família própria.
  - Ajudar as crianças da cidade a terem uma boa educação.
  - Escapar da vida caótica em seu pequeno trailer.
relacionamentos:
  - Pam: Mãe (relação complicada devido ao alcoolismo de Pam).
  - Jas: Aluna.
  - Vincent: Aluno.
  - Maru: Amiga.
  - Sam: Amigo.
historia_relevante:
  - Mora com sua mãe, Pam, em um trailer apertado e bagunçado perto do rio.
  - Sente-se envergonhada por sua condição de vida e pelo comportamento de sua mãe.
  - Dedica seu tempo a ensinar as duas crianças da cidade, Jas e Vincent, no museu, atuando como professora não oficial.
  - Sonha com uma vida mais tranquila e organizada, diferente da que tem atualmente.
segredos:
  - (Apenas para o Mestre) Sente-se profundamente infeliz e presa em sua situação de vida, mas raramente reclama para não magoar sua mãe.
  - (Apenas para o Mestre) Anseia desesperadamente por uma figura familiar estável e por um lar que possa chamar de seu.
notas_de_interpretacao:
  - Fala de maneira suave e educada, muitas vezes de forma hesitante.
  - Tenta manter uma visão positiva da vida, mesmo quando as coisas são difíceis.
  - Seus olhos se iluminam quando fala sobre livros ou sobre o potencial de seus alunos.
