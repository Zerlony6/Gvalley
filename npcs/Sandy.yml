nome: Sandy
apelidos: []
idade: Adulta
ocupacao: Proprietária da loja Oásis
personalidade:
  - Extrovertida, amigável e um pouco dramática.
  - Adora moda e fofocas.
  - Sente-se solitária devido ao isolamento de sua loja.
  - É muito grata por qualquer interação social.
motivacoes:
  - Vender seus produtos exóticos.
  - Fazer amigos e conectar-se com o mundo fora do deserto.
  - Manter contato com sua melhor amiga, Emily.
relacionamentos:
  - Emily: Melhor amiga.
  - Sr. Qi: É seu senhorio e opera o Cassino nos fundos de sua loja.
historia_relevante:
  - Administra a loja Oásis, localizada no Deserto de Calico, que só se torna acessível depois que o ônibus é consertado.
  - Seu nome verdadeiro não é Sandy; ela o adotou por ser "bom para os negócios".
  - Vive uma vida muito solitária, com poucos clientes, e fica extremamente animada quando o jogador a visita.
  - Mantém sua amizade com Emily através de cartas.
segredos:
  - (Apenas para o Mestre) Seu nome verdadeiro, que ela nunca revela.
  - (Apenas para o Mestre) A profunda solidão e o tédio que ela sente por estar isolada no deserto.
  - (Apenas para o Mestre) Ela sabe sobre as atividades do Sr. Qi no cassino e "olha para o outro lado" em troca de algo.
notas_de_interpretacao:
  - Fala de maneira animada, calorosa e um pouco exagerada, como uma vendedora carismática.
  - Frequentemente comenta sobre o calor, o tédio ou a sorte de ter um visitante.
  - Usa uma linguagem um pouco mais "urbana" ou "da moda" em comparação com os outros aldeões.
