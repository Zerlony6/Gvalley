nome: Morris
apelidos: []
idade: Adulto
ocupacao: Gerente do Mercado Joja
personalidade:
  - Corporativo, ambicioso e um pouco bajulador.
  - Extremamente focado em lucro e eficiência.
  - Acredita firmemente na superioridade do modelo de negócios da Joja.
  - Não tem escrúpulos em usar táticas agressivas para eliminar a concorrência.
motivacoes:
  - Expandir a influência da Corporação Joja.
  - Provar seu valor como gerente e subir na hierarquia da empresa.
  - Substituir o estilo de vida tradicional da cidade pela conveniência moderna da Joja.
relacionamentos:
  - Pierre: Rival de negócios.
historia_relevante:
  - É o gerente e representante da Corporação Joja na Vila Pelicanos.
  - Sua chegada representa a principal ameaça ao Armazém do Pierre e ao modo de vida local.
  - Oferece ao jogador uma adesão à Joja que, se aceita, transforma o Centro Comunitário em um Armazém Joja e altera fundamentalmente o progresso do jogo.
  - Ele é o principal antagonista da rota de restauração do Centro Comunitário.
segredos:
  - (Apenas para o Mestre) Despreza genuinamente o que ele vê como a "ineficiência" e o "atraso" da vida em uma cidade pequena.
  - (Apenas para o Mestre) Sua lealdade é inteiramente para com a Corporação Joja, não tendo nenhum apego real à Vila Pelicanos ou seus habitantes.
  - (Apenas para o Mestre) Ele vê o jogador não como uma pessoa, mas como um ativo em potencial ou um obstáculo para seus planos de negócios.
notas_de_interpretacao:
  - Fala de maneira excessivamente educada e comercial, com um sorriso forçado.
  - Usa jargão corporativo e slogans da Joja.
  - Seu tom se torna mais agressivo e competitivo ao discutir negócios ou seu rival, Pierre.
