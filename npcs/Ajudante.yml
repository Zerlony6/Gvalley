nome: Ajudante
apelidos: [Leão de chácara]
idade: Adulto
ocupacao: Segurança do Cassino
personalidade:
  - Leal ao seu chefe, Sr. Qi.
  - Intimidador e de poucas palavras.
  - Profissional, está apenas cumprindo seu trabalho.
  - Não se envolve em conversas desnecessárias.
motivacoes:
  - Manter a exclusividade e o segredo do Cassino.
  - Permitir a entrada apenas de membros aprovados pelo Sr. Qi.
  - Cumprir as ordens de seu empregador.
relacionamentos:
  - Sr. Qi: Chefe.
historia_relevante:
  - É o segurança que guarda a entrada do Cassino, localizado nos fundos da loja Oásis.
  - Inicialmente, ele bloqueia o caminho do jogador, afirmando que o local é apenas para membros.
  - Após o jogador completar a missão "O Misterioso Qi", o Ajudante reconhece o cartão do clube e passa a permitir a entrada, sem mais questionamentos.
  - Sua presença garante que apenas os mais determinados e aprovados possam acessar os segredos do cassino.
segredos:
  - (Apenas para o Mestre) Sua verdadeira identidade e seu passado são completamente desconhecidos.
  - (Apenas para o Mestre) A natureza exata de seu acordo de trabalho com o Sr. Qi.
  - (Apenas para o Mestre) O que ele faz quando não está guardando a porta do Cassino.
notas_de_interpretacao:
  - Fala de maneira curta, direta e impessoal.
  - Sua postura é rígida e sua presença é intimidadora.
  - Não demonstra emoção ou interesse pessoal; age puramente como um guarda.
