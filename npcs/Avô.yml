nome: Desconhecido
apelidos: [Avô]
idade: Falecido
ocupacao: Fazendeiro
personalidade:
  - Sábio, gentil e carinhoso.
  - Desiludido com o vazio da vida moderna e do consumismo.
  - Valoriza o trabalho honesto, a comunidade e a conexão com a natureza.
  - Encorajador e acredita no potencial de seu neto(a).
motivacoes:
  - Oferecer a seu neto(a) uma fuga da vida estressante da cidade.
  - Passar adiante o legado da fazenda da família.
  - Ver seu neto(a) encontrar a verdadeira felicidade e um senso de propósito.
relacionamentos:
  - Jogador: Neto ou Neta.
historia_relevante:
  - Era o proprietário original da fazenda que o jogador herda.
  - Em seu leito de morte, deixou uma carta contendo a escritura da fazenda, a ser aberta quando seu neto(a) sentisse que precisava de uma mudança na vida.
  - A carta do Avô serve como o catalisador para toda a história do jogo.
  - Seu espírito retorna no início do terceiro ano para avaliar o progresso do jogador na fazenda, nas amizades e na vida comunitária, oferecendo um selo de aprovação.
segredos:
  - (Apenas para o Mestre) A natureza exata de sua própria vida na cidade antes de se mudar para a fazenda e encontrar a paz.
  - (Apenas para o Mestre) O conhecimento sobre os segredos místicos do vale, que ele deixa para o neto(a) descobrir por conta própria.
notas_de_interpretacao:
  - Sua "voz" é a de um mentor sábio e benevolente, expressa através de sua carta e de sua avaliação espiritual.
  - Suas palavras são cheias de amor, nostalgia e esperança, guiando o jogador em direção a uma vida mais significativa.
