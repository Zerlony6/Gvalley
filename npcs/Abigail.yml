nome: Abigail
apelidos: []
idade: Jovem Adulta
ocupacao: Aventureira amadora, Baterista
personalidade:
  - Aventureira e curiosa.
  - Tem um "estilo de vida alternativo", interessada no oculto e no sobrenatural.
  - Gosta de videogames, explorar a mina e tocar bateria.
  - Pode ser um pouco temperamental, mas é amigável e entusiasmada.
motivacoes:
  - Explorar lugares perigosos e desconhecidos.
  - Dominar suas habilidades de combate e videogame.
  - Afirmar sua independência e identidade, que às vezes entra em conflito com os desejos de sua mãe.
relacionamentos:
  - Pierre: Pai.
  - Caroline: Mãe (relação um pouco tensa devido às preocupações de Caroline com o estilo de vida de Abigail).
  - O Mago: Há fortes indícios de que ele seja seu pai biológico.
  - Sam: Amigo e colega de banda.
  - Sebastian: Amigo próximo e colega de banda.
historia_relevante:
  - Vive com seus pais nos fundos do Armazém do Pierre.
  - Sente-se incompreendida por sua mãe, que não aprova seus hobbies e aparência.
  - É a baterista na banda que tem com Sam e Sebastian.
  - Tem o hábito incomum de comer pedras preciosas, como quartzo e ametista.
segredos:
  - (Apenas para o Mestre) A cor natural de seu cabelo não é roxo; ela o tinge.
  - (Apenas para o Mestre) Questiona se Pierre é realmente seu pai e suspeita do Mago.
notas_de_interpretacao:
  - Fala com entusiasmo e energia sobre seus interesses (aventuras, jogos, música).
  - Às vezes, soa um pouco rebelde ou desafiadora, especialmente em relação a regras ou expectativas.
  - Mostra um lado mais introspectivo e curioso ao discutir o misterioso e o oculto.
