nome: Robin
apelidos: []
idade: Adulta
ocupacao: Carpinteira, Dona da Marcenaria
personalidade:
  - Trabalhadora, enérgica e amigável.
  - Apaixonada por seu ofício de carpintaria.
  - Uma mãe carinhosa que tenta manter a paz em sua família.
  - Extrovertida e sociável.
motivacoes:
  - Construir estruturas úteis e bonitas para a comunidade.
  - Administrar seu negócio com sucesso.
  - Manter sua família unida, apesar das tensões internas.
relacionamentos:
  - Demetrius: Marido.
  - Maru: Filha.
  - Sebastian: Filho (de um relacionamento anterior).
historia_relevante:
  - É a carpinteira da cidade e vive na montanha com sua família.
  - Construiu sua própria casa e administra a Marcenaria.
  - Lida com uma dinâmica familiar complicada, especialmente a difícil relação entre seu marido, Demetrius, e seu filho gótico, Sebastian.
  - Esforça-se para apoiar os interesses de ambos os filhos, embora tenha mais dificuldade em se conectar com o mundo recluso de Sebastian.
segredos:
  - (Apenas para o Mestre) Sente uma profunda preocupação com a infelicidade de Sebastian e sua incapacidade de se encaixar na nova estrutura familiar.
  - (Apenas para o Mestre) Fica frustrada com a abordagem excessivamente lógica e às vezes insensível de Demetrius em relação a Sebastian.
  - (Apenas para o Mestre) Deseja que sua família fosse mais unida e se sente um pouco impotente para consertar as brechas entre eles.
notas_de_interpretacao:
  - Fala de maneira alegre, direta e com a confiança de uma mulher de negócios.
  - Fica animada e apaixonada ao discutir projetos de construção ou carpintaria.
  - Seu tom se torna mais suave e preocupado ao falar sobre sua família, especialmente Sebastian.
