nome: Shane
apelidos: []
idade: Adulto
ocupacao: Funcionário do Mercado Jo-ja, Criador de galinhas
personalidade:
  - Inicialmente rude, cínico e fechado.
  - Sofre de depressão e alcoolismo.
  - Por baixo da aparência áspera, ele é carinhoso e protetor com quem se importa.
  - Luta contra a desesperança e a baixa autoestima.
motivacoes:
  - Lidar com seus problemas de saúde mental e alcoolismo.
  - Encontrar um propósito para continuar vivendo.
  - Cuidar de sua afilhada, Jas.
relacionamentos:
  - Marnie: Tia, com quem ele mora.
  - Jas: Afilhada, a quem ele ama e protege.
  - Emily: Amiga.
historia_relevante:
  - Mudou-se para o rancho de sua tia Marnie após um período difícil em sua vida.
  - Trabalha em um emprego sem futuro no Mercado Jo-ja, o que alimenta sua depressão.
  - Sua jornada de amizade envolve confrontar seu alcoolismo e pensamentos suicidas.
  - Encontra uma nova paixão e propósito ao criar galinhas, especialmente suas galinhas azuis.
segredos:
  - (Apenas para o Mestre) Chegou a contemplar o suicídio à beira de um penhasco.
  - (Apenas para o Mestre) Usa sua atitude rude como um mecanismo de defesa para afastar as pessoas, por medo de se machucar ou de ser um fardo.
notas_de_interpretacao:
  - Comunicação curta e grosseira no início.
  - Frequentemente suspira ou resmunga.
  - Conforme a amizade se desenvolve, suas conversas se tornam mais longas e revelam suas vulnerabilidades e seu lado mais gentil.
