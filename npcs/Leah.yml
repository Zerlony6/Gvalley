nome: Leah
apelidos: []
idade: Jovem Adulta
ocupacao: Artista (Escultora, Pintora)
personalidade:
  - Criativa e artística.
  - Amante da natureza, vive um estilo de vida simples e ao ar livre.
  - Um pouco reclusa e tímida para mostrar seu trabalho.
  - Amigável, saudável e independente.
motivacoes:
  - Focar em sua carreira como artista e ganhar confiança.
  - Viver uma vida autêntica e conectada com a natureza.
  - Superar as dúvidas deixadas por seu relacionamento passado.
relacionamentos:
  - Kel: Ex-parceiro(a) da cidade, que desaprovava sua carreira artística.
  - Elliott: Amigo, com quem compartilha interesses artísticos.
historia_relevante:
  - Mudou-se de Zuzu City para a Vila Pelicanos para escapar da vida urbana e de um relacionamento que a sufocava.
  - Vive em uma pequena cabana na Floresta Cinzaseiva.
  - Passa seus dias esculpindo, pintando e buscando inspiração e materiais na natureza.
  - Sua jornada de amizade envolve a decisão de como compartilhar sua arte com o mundo, seja através de uma exposição na cidade ou vendendo online.
segredos:
  - (Apenas para o Mestre) Sente uma profunda insegurança sobre o valor de sua arte, em grande parte devido às críticas de seu ex-parceiro(a), Kel.
  - (Apenas para o Mestre) Escolheu a solidão da floresta não apenas pela inspiração, mas também como um refúgio para se curar de seu relacionamento passado.
notas_de_interpretacao:
  - Fala de forma calma, gentil e um pouco ponderada.
  - Expressa-se com paixão e conhecimento ao falar sobre arte, natureza ou alimentos silvestres.
  - É educada e um pouco formal até que uma amizade mais profunda seja estabelecida.
