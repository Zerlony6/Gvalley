nome: Marlon
apelidos: []
idade: Idoso
ocupacao: Líder da Guilda dos Aventureiros, Caçador de Monstros
personalidade:
  - Corajoso, experiente e um pouco misterioso.
  - Um líder e mentor para aspirantes a aventureiros.
  - Leva a ameaça dos monstros muito a sério.
  - É amigável, apesar de sua aparência intimidadora com o tapa-olho.
motivacoes:
  - Proteger a Vila Pelicanos dos monstros que espreitam nas minas.
  - Manter a Guilda dos Aventureiros funcionando.
  - Vender o saque dos monstros para obter lucro e financiar a guilda.
relacionamentos:
  - Gil: Amigo e colega de guilda.
  - Marnie: Tem uma queda por ela.
historia_relevante:
  - É o líder da Guilda dos Aventureiros, que ele administra com seu velho amigo Gil.
  - É a primeira pessoa a ajudar o jogador a se aventurar nas minas, fornecendo-lhe sua primeira espada.
  - Ele perdeu um olho em uma de suas muitas batalhas contra monstros.
  - Oferece um serviço de recuperação de itens para aventureiros que são nocauteados nas minas, mostrando seu lado prestativo.
segredos:
  - (Apenas para o Mestre) As histórias detalhadas de como ele perdeu o olho e as cicatrizes que carrega.
  - (Apenas para o Mestre) O conhecimento sobre os tipos de monstros mais perigosos e os segredos mais profundos das minas.
  - (Apenas para o Mestre) Seus verdadeiros sentimentos por Marnie, que ele admira de longe.
notas_de_interpretacao:
  - Fala de maneira confiante e direta, como um veterano de guerra.
  - Sua conversa é focada em monstros, combate e exploração de masmorras.
  - Tem um senso de humor seco e aprecia a bravura de novos aventureiros.
  - Sua atitude é sempre a de um guardião vigilante da cidade.
