nome: Gus
apelidos: []
idade: Adulto
ocupacao: Dono do Saloon Fruta Estrelar, Chef de cozinha
personalidade:
  - Alegre, amigável e extremamente acolhedor.
  - Generoso, muitas vezes a ponto de prejudicar seu próprio negócio.
  - Apaixonado por culinária e por criar um ambiente comunitário.
  - Um bom ouvinte e confidente para muitos na cidade.
motivacoes:
  - Fazer do Saloon o coração da comunidade da Vila Pelicanos.
  - Garantir que todos se sintam bem-vindos e bem alimentados.
  - Manter seu negócio funcionando apesar de sua generosidade.
relacionamentos:
  - Emily: Funcionária.
  - Pam: Amiga e sua cliente mais fiel (e endividada).
  - Clint: Amigo e cliente regular.
  - Linus: Gus frequentemente lhe dá comida.
historia_relevante:
  - É o proprietário e chef do Saloon Fruta Estrelar, o principal ponto de encontro social da cidade.
  - Luta para equilibrar as finanças do bar com sua natureza generosa, especialmente com a grande conta de bar de Pam.
  - Conhece quase todos na cidade e está a par da maioria das fofocas e problemas, servindo como um pilar da comunidade.
  - Demonstra grande orgulho de seu estabelecimento e de sua comida.
segredos:
  - (Apenas para o Mestre) Preocupa-se constantemente com a possibilidade de o saloon ir à falência devido às dívidas de seus clientes e sua própria incapacidade de ser duro com eles.
  - (Apenas para o Mestre) Conhece os problemas e segredos de quase todos na cidade, pois ouve tudo de trás do balcão, mas é discreto sobre isso.
notas_de_interpretacao:
  - Fala de forma calorosa e convidativa, sempre com uma atitude de anfitrião.
  - Frequentemente oferece comida ou bebida.
  - É sempre otimista e sorridente, mesmo quando está preocupado com os negócios.
