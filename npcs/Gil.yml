nome: Gil
apelidos: []
idade: Idoso
ocupacao: Aventureiro Aposentado
personalidade:
  - Quieto e um pouco rabugento.
  - Parece estar sempre cochilando em sua cadeira.
  - Respeita os feitos de novos aventureiros.
  - Orgulhoso de seu passado como caçador de monstros.
motivacoes:
  - Descansar e relembrar suas antigas glórias.
  - Recompensar a nova geração de aventureiros por seus feitos.
  - Manter a Guilda dos Aventureiros como um refúgio seguro.
relacionamentos:
  - Marlon: Amigo e colega de guilda.
historia_relevante:
  - É um aventureiro veterano que agora passa seus dias na Guilda dos Aventureiros.
  - É ele quem concede as recompensas ao jogador por completar os Objetivos de Erradicação de Monstros.
  - A julgar por sua posição e pelas recompensas que oferece, ele foi um grande matador de monstros em sua juventude.
  - Raramente fala, preferindo o conforto de sua cadeira de balanço.
segredos:
  - (Apenas para o Mestre) As incontáveis histórias de suas batalhas e aventuras passadas, que ele guarda para si.
  - (Apenas para o Mestre) A natureza dos ferimentos ou da idade que o forçaram a se aposentar da vida de aventureiro.
  - (Apenas para o Mestre) Um profundo respeito por Marlon, com quem provavelmente compartilhou muitas jornadas perigosas.
notas_de_interpretacao:
  - Geralmente quieto ou resmungando como se estivesse com sono.
  - Sua fala é curta e direta, geralmente relacionada às recompensas por matar monstros.
  - Demonstra um raro momento de entusiasmo ou respeito quando o jogador completa um objetivo significativo.
