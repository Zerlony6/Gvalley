nome: Jas
apelidos: []
idade: Criança
ocupacao: Estudante
personalidade:
  - Tímida e quieta, especialmente com adultos que não conhece.
  - Doce e imaginativa.
  - Gosta de brincar ao ar livre e pular corda.
  - Um pouco mais madura e cautelosa que seu amigo Vincent.
motivacoes:
  - Brincar com Vincent.
  - Aprender com sua professora, Penny.
  - Passar tempo com seu padrinho, Shane.
relacionamentos:
  - Marnie: Tia-avó, com quem ela mora.
  - Shane: Padrinho, que cuida dela.
  - Vincent: Melhor amigo.
  - Penny: Tutora/Professora.
historia_relevante:
  - É órfã e mora no rancho com sua tia-avó Marnie e seu padrinho Shane.
  - Seus pais, que eram amigos de Shane, faleceram por motivos desconhecidos.
  - Passa a maior parte do tempo brincando com Vincent ou tendo aulas com Penny na biblioteca do museu.
  - Apesar de sua timidez, ela tem uma visão infantil e curiosa do mundo.
segredos:
  - (Apenas para o Mestre) A dor e a confusão pela perda de seus pais, que ela pode não conseguir expressar completamente.
  - (Apenas para o Mestre) Ela vê Shane como uma figura paterna e se preocupa muito com ele, especialmente quando ele está triste.
notas_de_interpretacao:
  - Fala de forma simples e infantil.
  - É muito hesitante e dá respostas curtas a estranhos.
  - Fica mais animada e falante quando está com Vincent ou Shane.
  - Frequentemente menciona seus jogos ou o que aprendeu com Penny.
