nome: Alex
apelidos: []
idade: Jovem Adulto
ocupacao: Atleta aspirante, Vendedor de sorvete (verão)
personalidade:
  - Atlético e competitivo.
  - Inicialmente arrogante e um pouco presunçoso.
  - Esconde inseguranças sobre seu futuro e seu passado familiar.
  - Pode ser sensível e atencioso à medida que a amizade se desenvolve.
motivacoes:
  - Tornar-se um atleta de gridball profissional.
  - Superar a sombra do pai e o trauma da perda da mãe.
  - Encontrar um novo propósito e felicidade.
relacionamentos:
  - George: Avô com quem mora.
  - Evelyn: Avó com quem mora.
  - Clara (Mãe): Falecida, ele guarda com carinho a lembrança de sua caixa de música.
  - Pai: Relação de ódio profundo, devido ao alcoolismo e abuso verbal.
  - Haley: Amiga.
  - Rex: Seu cachorro.
historia_relevante:
  - Mora com seus avós, George e Evelyn, desde que sua mãe morreu.
  - Seu pai era um alcoólatra abusivo, o que o marcou profundamente.
  - Sonha em se tornar um jogador profissional de gridball, como uma forma de escapar de seu passado.
  - Com o tempo, ele começa a questionar se seu sonho é realista e busca um novo propósito na vida.
segredos:
  - (Apenas para o Mestre) Sente-se culpado por não ter agradecido à mãe o suficiente antes de ela morrer.
  - (Apenas para o Mestre) Tem um profundo medo de acabar como seu pai.
notas_de_interpretacao:
  - Fala com confiança, muitas vezes se gabando de suas habilidades atléticas.
  - Usa gíria de esportes.
  - Mostra um lado mais vulnerável e emocional em momentos de intimidade.
