nome: Pierre
apelidos: []
idade: Adulto
ocupacao: Dono do Armazém
personalidade:
  - Focado em negócios e um pouco ganancioso.
  - Orgulhoso de sua loja e teme a concorrência do Mercado Joja.
  - Marido e pai, mas o trabalho muitas vezes parece ser sua prioridade.
  - Pode ser um pouco arrogante e desonesto para conseguir lucro.
motivacoes:
  - Expandir seu negócio e ganhar muito dinheiro.
  - Tirar o Mercado Joja da cidade.
  - Sustentar sua família através do sucesso de sua loja.
relacionamentos:
  - Caroline: Esposa.
  - Abigail: Filha (ele tem dúvidas sobre a paternidade dela).
historia_relevante:
  - É o proprietário do armazém local, onde vive com sua família.
  - Sua vida gira em torno de administrar a loja e competir ferozmente com o Mercado Joja.
  - Sonha em se tornar um grande comerciante com uma rede de lojas.
  - O relacionamento com sua filha Abigail é tenso, em parte por causa do estilo de vida dela e em parte por suas suspeitas secretas sobre o pai biológico dela.
segredos:
  - (Apenas para o Mestre) Tem um "esconderijo secreto" em seu quarto, levantando questões sobre o que ele esconde de sua esposa.
  - (Apenas para o Mestre) Se o jogador lhe vende produtos de alta qualidade, ele mente para os outros aldeões, dizendo que ele mesmo os encontrou/cultivou e os vende por um preço muito mais alto.
  - (Apenas para o Mestre) Guarda para si a dolorosa suspeita de que Abigail não é sua filha biológica.
notas_de_interpretacao:
  - Fala de maneira educada, mas sempre com um tom comercial, como se estivesse tentando fechar uma venda.
  - Seu tom se torna amargo e competitivo ao falar sobre o Mercado Joja.
  - Mostra uma mistura de orgulho e frustração ao falar de sua família.
