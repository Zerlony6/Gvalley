nome: Passarinha
apelidos: []
idade: Idosa
ocupacao: Eremita
personalidade:
  - Gentil, um pouco melancólica e nostálgica.
  - Resiliente e autossuficiente, vivendo da terra.
  - Sente uma profunda tristeza pela perda de seu marido.
  - Grata por qualquer ajuda ou companhia.
motivacoes:
  - Encontrar o medalhão de guerra de seu falecido marido para ter um fechamento.
  - Viver seus dias em paz na ilha que foi seu lar e o túmulo de seu amor.
relacionamentos:
  - Marido: Falecido, era um pirata que naufragou na ilha.
historia_relevante:
  - É uma mulher idosa que vive sozinha em uma cabana na Ilha Gengibre.
  - Ela é a viúva de um pirata cujo navio naufragou perto da ilha.
  - Seu marido se perdeu no mar, e a única lembrança que ela tinha dele, um medalhão, também foi perdida.
  - Ela pede ao jogador que encontre o medalhão para que ela possa ter paz, concluindo a missão "A Esposa do Pirata".
segredos:
  - (Apenas para o Mestre) A história completa de suas aventuras ao lado de seu marido pirata.
  - (Apenas para o Mestre) A razão pela qual ela escolheu permanecer sozinha na ilha após a morte dele.
  - (Apenas para o Mestre) A profunda solidão que sente, mascarada por sua rotina de sobrevivência.
notas_de_interpretacao:
  - Fala de maneira suave e um pouco triste, com o peso de suas memórias.
  - Sua conversa é frequentemente sobre seu marido, o mar ou a vida na ilha.
  - Expressa imensa gratidão e alívio quando sua missão é concluída, com seu humor se tornando visivelmente mais leve.
