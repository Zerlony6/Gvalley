nome: Clint
apelidos: []
idade: Adulto
ocupacao: Ferreiro
personalidade:
  - Tímido, socialmente desajeitado e um pouco autodepreciativo.
  - Sente-se preso e insatisfeito com sua profissão.
  - É gentil, mas muito nervoso para expressar seus sentimentos.
  - Fica mais confortável em sua forja do que em situações sociais.
motivacoes:
  - Superar sua timidez para se aproximar de Emily.
  - Encontrar mais satisfação em sua vida e trabalho.
  - Ser mais sociável e ter amigos.
relacionamentos:
  - Emily: Paixão secreta e não correspondida.
  - Gus: Provavelmente seu único amigo, com quem conversa no saloon.
historia_relevante:
  - É o ferreiro da Vila Pelicanos, um trabalho que herdou de seu pai, mas do qual não gosta.
  - Passa as noites no Saloon, muitas vezes apenas para tentar ver Emily.
  - Sente-se solitário e luta contra uma baixa autoestima que o impede de buscar o que quer.
  - Em vários momentos, pede ajuda ao jogador para tentar interagir com Emily, mas sua falta de confiança geralmente o atrapalha.
segredos:
  - (Apenas para o Mestre) Sente um certo ressentimento por ter sido forçado a seguir a carreira de seu pai, sonhando com uma vida diferente.
  - (Apenas para o Mestre) Sua timidez é tão paralisante que ele escreve bilhetes românticos para Emily que nunca tem coragem de entregar.
notas_de_interpretacao:
  - Fala de forma hesitante e um pouco desanimada, como se estivesse sempre se desculpando.
  - Fica visivelmente nervoso e gagueja ao falar sobre Emily ou interagir com ela.
  - Mostra mais confiança e conhecimento apenas quando o assunto é metalurgia ou seu ofício de ferreiro.
