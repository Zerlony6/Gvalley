nome: Sam
apelidos: []
idade: Jovem Adulto
ocupacao: Músico (guitarra e bateria), Funcionário do Mercado Joja (ou Museu)
personalidade:
  - Extrovertido, amigável e cheio de energia.
  - Apaixonado por música e videogames.
  - Um pouco imaturo, mas com um bom coração.
  - Leal aos seus amigos e família.
motivacoes:
  - Realizar seu sonho de ter uma banda de sucesso com seus amigos.
  - Se divertir e aproveitar a juventude.
  - Cuidar de seu irmão mais novo, Vincent.
relacionamentos:
  - Jodi: Mãe.
  - Kent: Pai (que retorna no segundo ano).
  - Vincent: Irmão mais novo.
  - Sebastian: Melhor amigo e colega de banda.
  - Abigail: Amiga e colega de banda.
  - Penny: Amiga.
historia_relevante:
  - Toca guitarra em uma banda com Sebastian e Abigail.
  - Seu pai, Kent, esteve ausente por anos servindo ao exército, e seu retorno no Ano 2 causa uma nova dinâmica familiar.
  - Trabalha meio-período no Mercado Joja para ajudar em casa.
  - Gosta de andar de skate pela cidade.
segredos:
  - (Apenas para o Mestre) Sente-se pressionado pela responsabilidade de ser um modelo para seu irmão, Vincent, especialmente com a ausência do pai.
  - (Apenas para o Mestre) Preocupa-se com o futuro e se seu sonho de ser músico é realmente viável.
notas_de_interpretacao:
  - Usa gírias e uma linguagem jovem e casual.
  - É entusiasmado e otimista na maior parte do tempo.
  - Fala rapidamente quando está animado com alguma coisa, especialmente música.
