nome: Jodi
apelidos: []
idade: Adulta
ocupacao: Dona de casa
personalidade:
  - Mãe dedicada e carinhosa.
  - Amigável e sociável, mas muitas vezes sobrecarregada com as tarefas domésticas.
  - Sente falta do marido e se preocupa com os filhos.
  - Procura manter uma rotina e um lar organizados.
motivacoes:
  - Criar bem seus filhos, Sam e Vincent.
  - Cuidar da casa e da família.
  - Lidar com a solidão e o estresse da ausência do marido e, posteriormente, com sua readaptação.
relacionamentos:
  - Kent: Marido (ausente no primeiro ano).
  - Sam: Filho mais velho.
  - Vincent: Filho mais novo.
  - Caroline: Melhor amiga.
historia_relevante:
  - No primeiro ano do jogo, ela cria seus dois filhos sozinha enquanto seu marido, Kent, está servindo ao exército.
  - Sente-se sobrecarregada com a responsabilidade de ser a única cuidadora dos filhos e da casa.
  - O retorno de Kent no segundo ano traz alívio, mas também o desafio de se reajustar à vida com um marido que lida com o trauma da guerra.
  - Ela é uma figura central na vida doméstica da cidade, frequentemente vista fazendo compras ou socializando com outras mães.
segredos:
  - (Apenas para o Mestre) Sente uma profunda solidão durante a ausência do marido, que ela esconde com sua rotina ocupada.
  - (Apenas para o Mestre) Luta para entender e lidar com o estresse pós-traumático de Kent após seu retorno, sentindo-se às vezes impotente para ajudá-lo.
notas_de_interpretacao:
  - Fala de maneira calorosa e amigável, como uma mãe de cidade pequena.
  - Sua conversa geralmente gira em torno de seus filhos, tarefas domésticas ou planos para o jantar.
  - Há um tom subjacente de cansaço e preocupação em sua voz, especialmente antes do retorno de Kent.
