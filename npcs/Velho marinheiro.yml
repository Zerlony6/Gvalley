nome: Desconhecido
apelidos: [Velho Marinheiro]
idade: Desconhecida (espírito)
ocupacao: Guardião de uma antiga tradição
personalidade:
  - Misterioso e enigmático.
  - De poucas palavras, focado em sua tarefa.
  - Fantasmagórico e etéreo.
  - Parece estar ligado a antigas tradições do mar.
motivacoes:
  - Fornecer o Amuleto da Sereia para aqueles que encontraram o amor verdadeiro.
  - Manter viva a antiga tradição de casamento do vale.
relacionamentos:
  - (Nenhum relacionamento conhecido)
historia_relevante:
  - É o espírito de um marinheiro que aparece na praia (na seção leste, além da ponte) apenas em dias de chuva.
  - Sua única função é vender o Amuleto da Sereia, o item necessário para propor casamento a um aldeão.
  - Ele só venderá o amuleto se o jogador atender a pré-requisitos específicos: ter melhorado a casa da fazenda e ter um relacionamento de 10 corações com um parceiro de casamento.
  - Sua presença garante que o ato do casamento seja um passo significativo e bem preparado.
segredos:
  - (Apenas para o Mestre) Sua verdadeira identidade e a história de como ele se tornou este espírito guardião.
  - (Apenas para o Mestre) A origem mágica do Amuleto da Sereia e por que ele está ligado a essa tarefa.
  - (Apenas para o Mestre) O que acontece com ele quando não está chovendo.
notas_de_interpretacao:
  - Sua presença é silenciosa e fantasmagórica.
  - Ele não se envolve em conversas, apenas declara sua função e as condições para a venda do amuleto.
  - Age como uma força da natureza, aparecendo com a chuva e desaparecendo com o sol.
