nome: Vincent
apelidos: []
idade: Criança
ocupacao: Estudante
personalidade:
  - Energético, ingênuo e curioso.
  - Adora brincar ao ar livre, caçar insetos e se sujar de lama.
  - Admira imensamente seu irmão mais velho, Sam.
  - É uma criança extrovertida e amigável.
motivacoes:
  - Divertir-se e brincar com sua amiga Jas.
  - Ser como seu irmão mais velho, Sam.
  - Aprender coisas novas com sua professora, Penny.
relacionamentos:
  - Jodi: Mãe.
  - Kent: Pai (retorna no Ano 2).
  - Sam: Irmão mais velho.
  - Jas: Melhor amiga.
  - Penny: Tutora/Professora, por quem ele tem uma "quedinha" infantil.
historia_relevante:
  - É o filho mais novo de Kent e Jodi e vive com sua família na cidade.
  - No primeiro ano, ele sente falta de seu pai, que está ausente servindo ao exército.
  - Passa a maior parte de seu tempo brincando com Jas, a única outra criança de sua idade.
  - Recebe aulas de Penny na biblioteca do museu.
segredos:
  - (Apenas para o Mestre) Sente saudades do pai no primeiro ano, mas não compreende totalmente a situação por ser muito jovem.
  - (Apenas para o Mestre) Tem um medo infantil de que seu pai não goste mais dele após retornar da guerra, por ter mudado.
  - (Apenas para o M-estre) Seu maior desejo é simplesmente que sua família esteja reunida e feliz.
notas_de_interpretacao:
  - Fala de maneira animada, direta e com a simplicidade de uma criança.
  - Sua conversa é cheia de entusiasmo sobre brincadeiras, insetos ou o que seu irmão Sam está fazendo.
  - Faz perguntas ingênuas e literais sobre o mundo ao seu redor.
