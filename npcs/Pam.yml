nome: Pam
apelidos: []
idade: Meia-idade
ocupacao: Motorista de Ônibus
personalidade:
  - Grosseira e um pouco rude na superfície.
  - Sofre de alcoolismo e parece deprimida com sua situação de vida.
  - Ama sua filha, mas tem dificuldade em expressar isso de forma positiva.
  - Pode ser surpreendentemente calorosa e grata com aqueles que são gentis com ela.
motivacoes:
  - Ganhar dinheiro para beber e sobreviver.
  - Encontrar algum escape ou alívio de suas dificuldades no Saloon.
  - Deseja o melhor para sua filha, Penny, apesar de suas falhas.
relacionamentos:
  - Penny: Filha (relação tensa devido ao alcoolismo e às condições de vida).
  - Gus: Amigo e dono do bar que ela frequenta todas as noites.
historia_relevante:
  - Mora em um trailer bagunçado com sua filha, Penny.
  - Antes do conserto do ônibus, ela está desempregada, o que agrava seu alcoolismo e depressão.
  - Depois que o jogador conserta o ônibus, ela recupera seu emprego como motorista, o que lhe dá um renovado senso de propósito.
  - Passa quase todas as noites no Saloon Fruta Estrelar, onde acumula uma grande dívida com Gus.
segredos:
  - (Apenas para o Mestre) A profunda desesperança e o sentimento de fracasso que alimentam seu vício em álcool.
  - (Apenas para o Mestre) Ela se sente culpada por não poder oferecer uma vida melhor para Penny, e essa culpa a leva a beber mais.
  - (Apenas para o Mestre) Apesar de sua aparência durona, ela é frágil e anseia por respeito e uma segunda chance.
notas_de_interpretacao:
  - Fala de maneira áspera e direta, muitas vezes reclamando.
  - Sua conversa gira frequentemente em torno de bebida, dinheiro ou o quão difícil é a vida.
  - Seu humor e diálogo mudam significativamente para melhor depois que ela volta a dirigir o ônibus.
  - Mostra um lado mais suave e agradecido quando recebe presentes que realmente gosta (como Cerveja ou Chirívia).
