nome: Harvey
apelidos: []
idade: Adulto
ocupacao: Médico
personalidade:
  - Gentil, inteligente e um pouco tímido.
  - Dedicado ao seu trabalho e à saúde dos outros.
  - Ansioso e se preocupa demais com as coisas.
  - Tem uma paixão secreta por aviação.
motivacoes:
  - Cuidar da saúde e do bem-estar dos moradores da Vila Pelicanos.
  - Superar sua ansiedade e medos.
  - Encontrar alguém com quem compartilhar seus interesses e sua vida.
relacionamentos:
  - Maru: Colega de trabalho na clínica.
historia_relevante:
  - É o médico da cidade e vive em um apartamento acima da clínica.
  - Sonhava em ser piloto quando criança, mas sua visão ruim e medo de altura o impediram.
  - Mantém seu amor pela aviação como um hobby, montando aeromodelos.
  - Parece um pouco solitário e anseia por companhia.
segredos:
  - (Apenas para o Mestre) Sofre de uma ansiedade significativa, especialmente em situações sociais.
  - (Apenas para o Mestre) Sente-se um pouco frustrado por não ter realizado seu sonho de ser piloto.
notas_de_interpretacao:
  - Fala de maneira calma e ponderada, mas com um tom de nervosismo subjacente.
  - Frequentemente menciona conselhos de saúde.
  - Fica animado e mais falante ao discutir tópicos que o interessam, como aviação.
