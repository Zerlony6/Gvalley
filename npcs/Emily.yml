nome: Emily
apelidos: []
idade: Jovem Adulta
ocupacao: Funcionária do Saloon, Alfaiate
personalidade:
  - Otimista, amigável e espirituosa.
  - Excêntrica e sonhadora.
  - Tem um grande amor por cristais, costura e meditação.
  - Expressiva e adora dançar.
motivacoes:
  - Expressar sua criatividade através da confecção de roupas.
  - Ajudar as pessoas a encontrarem seu "verdadeiro eu" através da "terapia da roupa".
  - Viver em harmonia com a natureza e as energias do universo.
relacionamentos:
  - Haley: Irmã com quem vive.
  - Sandy: Amiga próxima que vive no Deserto de Calico.
  - Clint: Ele tem uma paixão secreta por ela, mas ela parece não perceber.
  - Shane: Amigo e colega de trabalho no saloon.
historia_relevante:
  - Mora com a irmã, Haley, na casa de seus pais, que estão viajando pelo mundo.
  - Trabalha à noite no Saloon Fruta Estrelar para se sustentar.
  - Sua verdadeira paixão é a alfaiataria e ela sonha em fazer roupas para todos na cidade.
  - Tem sonhos vívidos e experiências espirituais que ela acredita serem presságios ou mensagens.
segredos:
  - (Apenas para o Mestre) Tem visões e sonhos que guiam suas ações, como acreditar que seus destinos estão entrelaçados com os do jogador após um sonho específico.
  - (Apenas para o Mestre) Sente-se um pouco presa na pequena cidade e anseia por mais saídas para sua criatividade e espiritualidade.
notas_de_interpretacao:
  - Fala de maneira alegre e, por vezes, mística, usando frases sobre "energia" e "vibrações".
  - É muito positiva e encorajadora.
  - Tem uma maneira única e livre de dançar para se expressar.
